# Mosquitto MQTT Broker Configuration
# Smart AI-IoT Classroom System

# ─── Listeners ───────────────────────────────────────────
# Default MQTT listener
listener 1883
protocol mqtt

# WebSocket listener (for browser-based MQTT clients)
listener 9001
protocol websockets

# ─── Security ────────────────────────────────────────────
# Allow anonymous connections (development only)
# In production, set to false and configure password_file
allow_anonymous true

# For production:
# allow_anonymous false
# password_file /mosquitto/config/passwords.txt
# acl_file /mosquitto/config/acl.conf

# ─── Persistence ─────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ─────────────────────────────────────────────
log_dest stdout
log_type all
connection_messages true
log_timestamp true
